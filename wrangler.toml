name = "ponomoly"
main = "worker/index.ts"
compatibility_date = "2024-11-01"

# Two Durable Object classes back the realtime layer:
#   GAME_ROOM — one instance per game room, holds authoritative state.
#   REGISTRY  — a singleton directory of active rooms (idFromName("index")).
[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[durable_objects.bindings]]
name = "REGISTRY"
class_name = "Registry"

# SQLite-backed Durable Objects (required on the Workers Free plan).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom", "Registry"]

# ADMIN_PASSWORD is a server-side secret, NOT set here. Set it with:
#   wrangler secret put ADMIN_PASSWORD
# It guards the /manage console and the room-delete endpoint (see worker/auth.ts).
